{% extends "base.html" %}

{% block title %}Editar Usuario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">
                    <i class="bi bi-pencil-square"></i> Editar Usuario: {{ usuario.username }}
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de usuario</label>
                        <input type="text" name="username" class="form-control" 
                               value="{{ usuario.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" 
                               value="{{ usuario.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre completo</label>
                        <input type="text" name="nombre_completo" class="form-control" 
                               value="{{ usuario.nombre_completo or '' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Rol</label>
                        <select name="rol" class="form-select">
                            <option value="empleado" {% if usuario.rol == 'empleado' %}selected{% endif %}>Empleado</option>
                            <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nueva contraseña <small class="text-muted">(dejar en blanco para no cambiar)</small></label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('usuarios.listar_usuarios') }}" class="btn btn-secondary me-md-2">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
